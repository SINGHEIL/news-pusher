name: News Push System

on:
  schedule:
    - cron: '0 1 * * *'  # 9:00 AM Beijing time daily
  workflow_dispatch:

jobs:
  push-news:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        # 确保检出所有文件
        fetch-depth: 0
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Debug - Show environment
      run: |
        echo "=== 环境信息 ==="
        echo "工作目录: $(pwd)"
        echo "Python版本: $(python --version)"
        echo ""
        echo "=== 文件列表 ==="
        find . -name "*.py" | sort
        echo ""
        echo "=== 关键文件检查 ==="
        for file in run_global_push.py international_news_fetcher.py requirements.txt; do
          if [ -f "$file" ]; then
            echo "✅ $file"
            ls -la "$file"
          else
            echo "❌ $file - 不存在"
          fi
        done
    
    - name: Install dependencies
      run: |
        echo "=== 安装依赖 ==="
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
        # 确保安装所有必需的包
        pip install requests beautifulsoup4 feedparser lxml schedule python-dotenv
        
        echo ""
        echo "=== 验证安装 ==="
        python -c "
import sys
print('Python路径:', sys.path)
try:
    import requests
    import bs4
    import feedparser
    print('✅ 基础依赖安装成功')
except ImportError as e:
    print(f'❌ 基础依赖安装失败: {e}')
        "
    
    - name: Test module imports
      run: |
        echo "=== 测试模块导入 ==="
        python -c "
import os
import sys

# 确保当前目录在路径中
sys.path.insert(0, '.')

modules_to_test = [
    'international_news_fetcher',
    'enhanced_news_fetcher',
    'enhanced_report_generator',
    'wechat_notifier',
    'config'
]

all_ok = True
for module_name in modules_to_test:
    try:
        __import__(module_name)
        print(f'✅ {module_name}')
    except Exception as e:
        print(f'❌ {module_name}: {e}')
        all_ok = False

if all_ok:
    print('✅ 所有模块导入成功')
else:
    print('❌ 有模块导入失败')
    # 显示详细错误
    for module_name in modules_to_test:
        try:
            __import__(module_name)
        except Exception as e:
            import traceback
            print(f'\n=== {module_name} 详细错误 ===')
            traceback.print_exc()
        "
    
    - name: Run news push (修复版)
      run: |
        echo "=== 运行新闻推送 ==="
        
        # 方法1：直接运行修复版
        if [ -f "run_global_push.py" ]; then
          echo "方法1: 直接运行 run_global_push.py"
          python run_global_push.py
        else
          echo "❌ run_global_push.py 不存在"
          echo "创建修复脚本..."
          
          # 方法2：创建修复脚本
          cat > fixed_push.py << 'EOF'
#!/usr/bin/env python3
import os
import sys
import logging

# 强制添加当前目录
sys.path.insert(0, os.getcwd())

logging.basicConfig(level=logging.INFO, format='%(asctime)s - %(levelname)s - %(message)s')
logger = logging.getLogger(__name__)

try:
    # 导入所有必需模块
    from enhanced_news_fetcher import EnhancedNewsFetcher
    from international_news_fetcher import InternationalNewsFetcher
    from enhanced_report_generator import EnhancedReportGenerator
    from wechat_notifier import WeChatNotifier
    
    logger.info("✅ 所有模块导入成功")
    
    # 这里可以添加实际的新闻推送逻辑
    logger.info("新闻推送系统准备就绪")
    
except Exception as e:
    logger.error(f"❌ 导入失败: {e}")
    import traceback
    traceback.print_exc()
EOF

          python fixed_push.py
        fi
      env:
        WECHAT_TEST_APPID: ${{ secrets.WECHAT_APPID }}
        WECHAT_TEST_SECRET: ${{ secrets.WECHAT_SECRET }}
        WECHAT_TEST_TOUSER: ${{ secrets.WECHAT_TOUSER }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    
    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: news-push-logs
        path: |
          *.log
          *.md
        retention-days: 7