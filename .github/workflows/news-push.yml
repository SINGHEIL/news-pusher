name: News Push

on:
  schedule:
    - cron: '0 1 * * *'  # 北京时间每天早上 9:00
  workflow_dispatch:     # 允许手动触发

jobs:
  push-news:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run news push
        env:
          WECHAT_TEST_APPID: ${{ secrets.WECHAT_TEST_APPID }}
          WECHAT_TEST_SECRET: ${{ secrets.WECHAT_TEST_SECRET }}
          WECHAT_TEST_TOUSER: ${{ secrets.WECHAT_TEST_TOUSER }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python run_enhanced_push.py
