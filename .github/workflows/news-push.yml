name: 每日公考财会新闻推送

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  news-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: 安装依赖
      run: |
        pip install requests beautifulsoup4 schedule python-dotenv
    
    - name: 运行推送程序
      run: |
        python -c "import logging; logging.basicConfig(level=logging.INFO); from exam_news_fetcher import ExamNewsFetcher; from content_filter import ContentFilter; from wechat_notifier import WeChatNotifier; fetcher = ExamNewsFetcher(); filter = ContentFilter(use_ai=False); notifier = WeChatNotifier({'WECHAT_TEST': True, 'WECHAT_TEST_APPID': '${{ secrets.WECHAT_APPID }}', 'WECHAT_TEST_SECRET': '${{ secrets.WECHAT_SECRET }}', 'WECHAT_TEST_TOUSER': '${{ secrets.WECHAT_TOUSER }}'}); all_news = fetcher.fetch_all_news(); filtered_news = filter.filter_news(all_news); report = filter.format_report(filtered_news); success = notifier.format_and_send(report); logging.info('成功!' if success else '失败!')"
