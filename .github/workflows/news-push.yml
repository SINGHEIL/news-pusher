name: 每日公考财会新闻推送

on:
  schedule:
    - cron: '0 10 * * *'  # 北京时间 18:00
  workflow_dispatch:

jobs:
  news-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: 安装依赖
      run: |
        pip install requests beautifulsoup4 schedule python-dotenv
    
    - name: 运行推送程序
      run: python run_push.py
      env:
        SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
