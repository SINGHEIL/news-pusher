name: Global News Push

on:
  schedule:
    - cron: '0 1 * * *'  # 9:00 AM Beijing time daily
  workflow_dispatch:

jobs:
  push-global-news:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: List files to verify
      run: |
        echo "=== 工作目录内容 ==="
        pwd
        ls -la
        echo "=== Python文件列表 ==="
        ls -la *.py
        echo "=== 检查run_global_push.py ==="
        if [ -f "run_global_push.py" ]; then
          echo "✅ run_global_push.py exists"
          head -5 run_global_push.py
        else
          echo "❌ run_global_push.py NOT FOUND"
        fi
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install feedparser lxml
        
    - name: Test Python environment
      run: |
        python -c "import sys; print('Python version:', sys.version)"
        python -c "import os; print('Current directory:', os.getcwd())"
        
    - name: Test module imports
      run: |
        python -c "
import sys
print('Python path:', sys.path)
try:
    import requests
    import bs4
    import feedparser
    print('✅ Basic modules imported')
except ImportError as e:
    print(f'❌ Basic module import failed: {e}')
        "
    
    - name: Run global news push
      run: |
        echo "=== 运行全球新闻推送 ==="
        if [ -f "run_global_push.py" ]; then
          python run_global_push.py
        else
          echo "❌ ERROR: run_global_push.py not found!"
          echo "当前目录: $(pwd)"
          echo "文件列表:"
          find . -name "*.py" | head -20
          exit 1
        fi
      env:
        WECHAT_TEST_APPID: ${{ secrets.WECHAT_APPID }}
        WECHAT_TEST_SECRET: ${{ secrets.WECHAT_SECRET }}
        WECHAT_TEST_TOUSER: ${{ secrets.WECHAT_TOUSER }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    
    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: news-push-logs
        path: |
          global_news_push.log
          news_statistics.md
        retention-days: 7