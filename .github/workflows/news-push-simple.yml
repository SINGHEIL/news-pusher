name: News Push Simple

on:
  schedule:
    # 每天北京时间9:00推送一次
    - cron: '0 1 * * *'
  # 移除手动触发，避免频繁测试导致微信限制
  # workflow_dispatch:

jobs:
  push-news:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Check file structure
      run: |
        echo "=== 文件检查 ==="
        echo "当前目录: $(pwd)"
        echo ""
        echo "核心文件:"
        for file in run_global_push_fixed.py requirements.txt; do
          if [ -f "$file" ]; then
            echo "✅ $file"
          else
            echo "❌ $file"
          fi
        done
    
    - name: Run simple news push
      run: |
        echo "=== 运行精简版推送 ==="
        echo "使用修复版脚本，避免微信限制"
        
        python run_global_push_fixed.py
        
        echo ""
        echo "=== 推送完成 ==="
        echo "如果出现微信限制错误，请等待24小时"
      env:
        WECHAT_TEST_APPID: ${{ secrets.WECHAT_APPID }}
        WECHAT_TEST_SECRET: ${{ secrets.WECHAT_SECRET }}
        WECHAT_TEST_TOUSER: ${{ secrets.WECHAT_TOUSER }}
    
    - name: Upload results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: news-push-results
        path: |
          global_news_push.log
          news_statistics.md
        retention-days: 3