name: Global News Push

on:
  schedule:
    - cron: '0 1 * * *'  # 北京时间 09:00
  workflow_dispatch:

jobs:
  push-global-news:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install feedparser lxml
    
    - name: Test imports
      run: |
        python -c "import requests; print('✅ requests imported')"
        python -c "import bs4; print('✅ bs4 imported')"
        python -c "import feedparser; print('✅ feedparser imported')"
    
    - name: Test network
      run: |
        python -c "
import requests
try:
    r = requests.get('https://www.reuters.com', timeout=5)
    if r.status_code == 200:
        print('✅ Network OK')
    else:
        print(f'⚠️ Status: {r.status_code}')
except Exception as e:
    print(f'⚠️ Error: {e}')
"
    
    - name: Run global news push
      run: python run_global_push.py
      env:
        SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    
    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: news-logs
        path: |
          global_news_push.log
          news_statistics.md
        retention-days: 7