name: Global News Push

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  push-global-news:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install feedparser lxml
    
    - name: Run global news push
      run: python run_global_push.py
      env:
        WECHAT_TEST_APPID: ${{ secrets.WECHAT_APPID }}
        WECHAT_TEST_SECRET: ${{ secrets.WECHAT_SECRET }}
        WECHAT_TEST_TOUSER: ${{ secrets.WECHAT_TOUSER }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
