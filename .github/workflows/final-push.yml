name: Global News Push Final

on:
  schedule:
    - cron: '0 1 * * *'  # 每天北京时间9:00
  workflow_dispatch:      # 手动触发支持

jobs:
  push-global-news:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # 获取所有历史
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Show detailed file list
      run: |
        echo "=== 详细文件列表 ==="
        echo "当前目录: $(pwd)"
        echo ""
        echo "=== 根目录文件（前20个）==="
        ls -la | head -20
        echo ""
        echo "=== Python文件（前20个）==="
        find . -name "*.py" -type f | sort | head -20
        echo ""
        echo "=== 关键文件检查 ==="
        for file in run_global_push.py international_news_fetcher.py enhanced_news_fetcher.py; do
          echo ""
          echo "检查 $file:"
          if [ -f "$file" ]; then
            echo "  ✅ 存在"
            echo "  大小: $(wc -l < "$file") 行"
            echo "  权限: $(ls -la "$file" | awk '{print $1}')"
            echo "  前2行:"
            head -2 "$file"
          else
            echo "  ❌ 不存在"
            echo "  尝试查找:"
            find . -name "*$(basename "$file")*" -type f 2>/dev/null || echo "  未找到"
          fi
        done
    
    - name: Install all dependencies
      run: |
        echo "=== 安装依赖 ==="
        python -m pip install --upgrade pip
        
        # 安装requirements.txt中的所有包
        if [ -f "requirements.txt" ]; then
          echo "从 requirements.txt 安装..."
          pip install -r requirements.txt
        else
          echo "⚠️  requirements.txt 不存在"
        fi
        
        # 确保核心包安装
        echo "安装核心包..."
        pip install requests beautifulsoup4 feedparser lxml schedule python-dotenv
        
        # 验证安装
        echo ""
        echo "=== 验证安装 ==="
        python -c "
import sys
print('Python版本:', sys.version.split()[0])
print('工作目录:', sys.path[0])

required = ['requests', 'bs4', 'feedparser', 'lxml']
for pkg in required:
    try:
        __import__(pkg)
        print(f'✅ {pkg}')
    except ImportError as e:
        print(f'❌ {pkg}: {e}')
        "
    
    - name: Debug module imports
      run: |
        echo "=== 模块导入调试 ==="
        
        cat > debug_import.py << 'EOF'
