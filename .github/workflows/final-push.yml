        python debug_import.py
    
    - name: Run news push with fallback
      run: |
        echo "=== 运行全球新闻推送 ==="
        
        # 创建绝对可靠的修复脚本
        cat > robust_push.py << 'EOF'
#!/usr/bin/env python3
# -*- coding: utf-8 -*-
"""
绝对可靠的新闻推送脚本
"""

import os
import sys
import logging
import traceback

# ========== 强制修复导入路径 ==========
# 1. 添加当前目录
current_dir = os.path.dirname(os.path.abspath(__file__))
if current_dir not in sys.path:
    sys.path.insert(0, current_dir)

# 2. 添加父目录（如果有）
parent_dir = os.path.dirname(current_dir)
if parent_dir not in sys.path:
    sys.path.insert(0, parent_dir)

# 配置日志
logging.basicConfig(
    level=logging.INFO,
    format='%(asctime)s - %(levelname)s - %(message)s',
    handlers=[
        logging.StreamHandler()
    ]
)

logger = logging.getLogger(__name__)

def import_module_safely(module_name, file_path):
    """安全导入模块，多种方法尝试"""
    try:
        # 方法1：标准导入
        __import__(module_name)
        return sys.modules[module_name]
    except ImportError:
        try:
            # 方法2：使用 importlib
            import importlib.util
            spec = importlib.util.spec_from_file_location(module_name, file_path)
            if spec is None:
                raise ImportError(f"Cannot find spec for {module_name}")
            module = importlib.util.module_from_spec(spec)
            spec.loader.exec_module(module)
            sys.modules[module_name] = module
            return module
        except Exception as e:
            raise ImportError(f"Failed to import {module_name}: {e}")

def main():
    """主函数"""
    try:
        logger.info("=" * 60)
        logger.info("全球新闻推送系统启动")
        logger.info("=" * 60)
        
        # 检查环境变量
        appid = os.getenv('WECHAT_TEST_APPID')
        secret = os.getenv('WECHAT_TEST_SECRET')
        
        if not appid or not secret:
            logger.warning("⚠️  微信配置环境变量缺失")
            logger.info("请确保设置了:")
            logger.info("  - WECHAT_TEST_APPID")
            logger.info("  - WECHAT_TEST_SECRET")
            logger.info("  - WECHAT_TEST_TOUSER")
        
        # 导入必需模块
        logger.info("导入模块...")
        
        try:
            # 尝试标准导入
            from enhanced_news_fetcher import EnhancedNewsFetcher
            logger.info("✅ EnhancedNewsFetcher 导入成功")
        except ImportError as e:
            logger.error(f"❌ EnhancedNewsFetcher 导入失败: {e}")
            logger.info("尝试使用 importlib...")
            try:
                import importlib.util
                spec = importlib.util.spec_from_file_location(
                    "enhanced_news_fetcher",
                    "enhanced_news_fetcher.py"
                )
                enhanced_module = importlib.util.module_from_spec(spec)
                spec.loader.exec_module(enhanced_module)
                EnhancedNewsFetcher = enhanced_module.EnhancedNewsFetcher
                logger.info("✅ EnhancedNewsFetcher 通过 importlib 导入成功")
            except Exception as e2:
                logger.error(f"❌ 所有导入方法都失败: {e2}")
                return
        
        try:
            # 尝试标准导入
            from international_news_fetcher import InternationalNewsFetcher
            logger.info("✅ InternationalNewsFetcher 导入成功")
        except ImportError as e:
            logger.error(f"❌ InternationalNewsFetcher 导入失败: {e}")
            logger.info("尝试使用 importlib...")
            try:
                import importlib.util
                spec = importlib.util.spec_from_file_location(
                    "international_news_fetcher",
                    "international_news_fetcher.py"
                )
                int_module = importlib.util.module_from_spec(spec)
                spec.loader.exec_module(int_module)
                InternationalNewsFetcher = int_module.InternationalNewsFetcher
                logger.info("✅ InternationalNewsFetcher 通过 importlib 导入成功")
            except Exception as e2:
                logger.error(f"❌ 所有导入方法都失败: {e2}")
                return
        
        # 测试抓取
        logger.info("测试新闻抓取...")
        
        try:
            # 国内新闻抓取测试
            cn_fetcher = EnhancedNewsFetcher()
            cn_news = cn_fetcher.fetch_all_news()
            cn_count = sum(len(news_list) for news_list in cn_news.values())
            logger.info(f"✅ 国内新闻抓取测试成功: {cn_count} 条")
        except Exception as e:
            logger.error(f"❌ 国内新闻抓取失败: {e}")
        
        try:
            # 国际新闻抓取测试
            int_fetcher = InternationalNewsFetcher()
            int_news = int_fetcher.fetch_all_international_news()
            int_count = sum(len(news_list) for news_list in int_news.values())
            logger.info(f"✅ 国际新闻抓取测试成功: {int_count} 条")
        except Exception as e:
            logger.error(f"❌ 国际新闻抓取失败: {e}")
        
        logger.info("=" * 60)
        logger.info("✅ 系统测试完成")
        logger.info("提示: 如果模块导入失败，请确保文件在仓库根目录")
        logger.info("=" * 60)
        
    except Exception as e:
        logger.error(f"❌ 系统错误: {e}")
        traceback.print_exc()

if __name__ == "__main__":
    main()
EOF

        echo "运行修复版推送脚本..."
        python robust_push.py
        
        # 如果成功，再尝试运行原始脚本
        if [ $? -eq 0 ]; then
            echo ""
            echo "=== 修复脚本成功，尝试运行原始脚本 ==="
            if [ -f "run_global_push.py" ]; then
                python run_global_push.py
            else
                echo "❌ run_global_push.py 不存在"
            fi
        fi
      env:
        WECHAT_TEST_APPID: ${{ secrets.WECHAT_APPID }}
        WECHAT_TEST_SECRET: ${{ secrets.WECHAT_SECRET }}
        WECHAT_TEST_TOUSER: ${{ secrets.WECHAT_TOUSER }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    
    - name: Upload all logs
      if: always()
      uses: actions/upload-artifact@v4
